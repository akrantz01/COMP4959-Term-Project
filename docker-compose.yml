# yaml-language-server: $schema=https://raw.githubusercontent.com/compose-spec/compose-spec/refs/heads/main/schema/compose-spec.json

services:
  database:
    image: postgres:18-alpine
    environment:
      POSTGRES_USER: uno
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-super-secure-password}"
    ports:
      - protocol: tcp
        target: 5432
        published: 5432
    volumes:
      - type: volume
        source: database
        target: /var/lib/postgresql

volumes:
  database:
