# yaml-language-server: $schema=https://www.schemastore.org/github-workflow.json

name: Build

"on":
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      database:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: uno
          POSTGRES_PASSWORD: super-secret-psasword
        ports:
          - "5432:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup-elixir
        with:
          cache-discriminator: test

      - run: mix test

  # TODO: add build job
